<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sessões Terapia</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, select, button {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

th {
    background: #eee;
}

.delete {
    background: red;
}
</style>
</head>

<body>

<div class="container">

<h2>Registro de Sessões</h2>

<input id="problematica" placeholder="Problemática">
<input id="sessao" placeholder="Sessão">
<input type="date" id="data">
<input type="time" id="duracao">

<label>Situação</label>
<select id="situacao">
    <option>Conflito no trabalho</option>
    <option>Ansiedade</option>
    <option>Estresse</option>
    <option>Conflito familiar</option>
    <option>Dificuldade de comunicação</option>
    <option>Outro</option>
</select>
<input id="situacaoLivre" placeholder="Se outro, escreva aqui">

<label>Objetivo</label>
<select id="objetivo">
    <option>Reduzir ansiedade</option>
    <option>Melhorar comunicação</option>
    <option>Controlar estresse</option>
    <option>Resolver conflito</option>
    <option>Organizar pensamentos</option>
    <option>Outro</option>
</select>
<input id="objetivoLivre" placeholder="Se outro, escreva aqui">

<label>Objetivo Alcançado</label>
<select id="resultado">
    <option>Sim</option>
    <option>Não</option>
</select>

<input id="pseudoterapeuta" placeholder="Pseudoterapeuta">

<button onclick="salvar()">Salvar</button>

<table>
<thead>
<tr>
<th>Problemática</th>
<th>Sessão</th>
<th>Data</th>
<th>Duração</th>
<th>Situação</th>
<th>Objetivo</th>
<th>Objetivo Alcançado</th>
<th>Pseudoterapeuta</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>
function salvar() {
    let situacao = document.getElementById("situacao").value;
    if (situacao === "Outro") {
        situacao = document.getElementById("situacaoLivre").value;
    }

    let objetivo = document.getElementById("objetivo").value;
    if (objetivo === "Outro") {
        objetivo = document.getElementById("objetivoLivre").value;
    }

    let dados = {
        problematica: document.getElementById("problematica").value,
        sessao: document.getElementById("sessao").value,
        data: document.getElementById("data").value,
        duracao: document.getElementById("duracao").value,
        situacao: situacao,
        objetivo: objetivo,
        resultado: document.getElementById("resultado").value,
        pseudoterapeuta: document.getElementById("pseudoterapeuta").value
    };

    let lista = JSON.parse(localStorage.getItem("dadosTerapia")) || [];
    lista.push(dados);
    localStorage.setItem("dadosTerapia", JSON.stringify(lista));

    carregar();
    limparCampos();
}

function carregar() {
    let lista = JSON.parse(localStorage.getItem("dadosTerapia")) || [];
    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    lista.forEach((item, index) => {
        tabela.innerHTML += `
        <tr>
            <td>${item.problematica || ""}</td>
            <td>${item.sessao || ""}</td>
            <td>${item.data || ""}</td>
            <td>${item.duracao || ""}</td>
            <td>${item.situacao || ""}</td>
            <td>${item.objetivo || ""}</td>
            <td>${item.resultado || ""}</td>
            <td>${item.pseudoterapeuta || ""}</td>
            <td><button class="delete" onclick="excluir(${index})">Excluir</button></td>
        </tr>
        `;
    });
}

function excluir(index) {
    let lista = JSON.parse(localStorage.getItem("dadosTerapia")) || [];
    lista.splice(index, 1);
    localStorage.setItem("dadosTerapia", JSON.stringify(lista));
    carregar();
}

function limparCampos() {
    document.getElementById("problematica").value = "";
    document.getElementById("sessao").value = "";
    document.getElementById("data").value = "";
    document.getElementById("duracao").value = "";
    document.getElementById("situacaoLivre").value = "";
    document.getElementById("objetivoLivre").value = "";
    document.getElementById("pseudoterapeuta").value = "";
}

carregar();
</script>

</body>
</html>
